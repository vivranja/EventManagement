AWSTemplateFormatVersion: '2010-09-09'
Description: EventFlow - ECS Fargate (backend + frontend) + ALB (ECR repos managed outside CF)

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  JwtSecret:
    Type: String
    NoEcho: true
  TableName:
    Type: String
    Default: eventflow
  BackendDesiredCount:
    Type: Number
    Default: 1
  FrontendDesiredCount:
    Type: Number
    Default: 1

Resources:

  # ── IAM ───────────────────────────────────────────────────────────────────
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: eventflow-ecs-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: eventflow-ecs-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                Resource:
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TableName}'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TableName}/index/*'
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:DeleteObject]
                Resource: !Sub 'arn:aws:s3:::eventflow-layouts-${AWS::AccountId}/*'

  # ── CloudWatch ────────────────────────────────────────────────────────────
  BackendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/eventflow-backend
      RetentionInDays: 14

  FrontendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/eventflow-frontend
      RetentionInDays: 14

  # ── ECS Cluster ───────────────────────────────────────────────────────────
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: eventflow
      CapacityProviders: [FARGATE, FARGATE_SPOT]

  # ── Security Groups ───────────────────────────────────────────────────────
  AlbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EventFlow ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 80, ToPort: 80, CidrIp: 0.0.0.0/0 }

  EcsSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EventFlow ECS Tasks
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 3000, ToPort: 4000, SourceSecurityGroupId: !Ref AlbSg }

  # ── ALB ───────────────────────────────────────────────────────────────────
  AppAlb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: eventflow
      Scheme: internet-facing
      Type: application
      Subnets: !Ref PublicSubnetIds
      SecurityGroups: [!Ref AlbSg]

  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: eventflow-backend
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: 4000
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  FrontendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: eventflow-frontend
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: 3000
      TargetType: ip
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200-399'

  # Default → frontend; /api/* and /health → backend
  AppListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref AppAlb
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref FrontendTargetGroup

  ApiListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref AppListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values: ['/api/*']
      Actions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  HealthListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref AppListener
      Priority: 20
      Conditions:
        - Field: path-pattern
          Values: ['/health']
      Actions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  # ── Backend Task + Service ────────────────────────────────────────────────
  BackendTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: eventflow-backend
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: backend
          Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/eventflow-backend:latest'
          PortMappings:
            - { ContainerPort: 4000, Protocol: tcp }
          Environment:
            - { Name: AWS_REGION,     Value: !Ref AWS::Region }
            - { Name: DYNAMODB_TABLE, Value: !Ref TableName }
            - { Name: S3_BUCKET,      Value: !Sub 'eventflow-layouts-${AWS::AccountId}' }
            - { Name: NODE_ENV,       Value: production }
            - { Name: PORT,           Value: '4000' }
            - { Name: JWT_SECRET,     Value: !Ref JwtSecret }
            - { Name: FRONTEND_URL,   Value: !Sub 'http://${AppAlb.DNSName}' }
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/eventflow-backend
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  BackendService:
    Type: AWS::ECS::Service
    DependsOn: [AppListener, ApiListenerRule]
    Properties:
      ServiceName: eventflow-backend
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref BackendTaskDef
      DesiredCount: !Ref BackendDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref PublicSubnetIds
          SecurityGroups: [!Ref EcsSg]
      LoadBalancers:
        - ContainerName: backend
          ContainerPort: 4000
          TargetGroupArn: !Ref BackendTargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 200

  # ── Frontend Task + Service ───────────────────────────────────────────────
  FrontendTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: eventflow-frontend
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: frontend
          Image: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/eventflow-frontend:latest'
          PortMappings:
            - { ContainerPort: 3000, Protocol: tcp }
          Environment:
            - { Name: NODE_ENV, Value: production }
            - { Name: PORT,     Value: '3000' }
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/eventflow-frontend
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  FrontendService:
    Type: AWS::ECS::Service
    DependsOn: AppListener
    Properties:
      ServiceName: eventflow-frontend
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref FrontendTaskDef
      DesiredCount: !Ref FrontendDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref PublicSubnetIds
          SecurityGroups: [!Ref EcsSg]
      LoadBalancers:
        - ContainerName: frontend
          ContainerPort: 3000
          TargetGroupArn: !Ref FrontendTargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 200

Outputs:
  AppUrl:
    Description: Application URL (frontend + backend on same ALB)
    Value: !Sub 'http://${AppAlb.DNSName}'

  BackendEcrUri:
    Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/eventflow-backend'

  FrontendEcrUri:
    Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/eventflow-frontend'
