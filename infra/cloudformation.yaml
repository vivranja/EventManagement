AWSTemplateFormatVersion: '2010-09-09'
Description: EventFlow - DynamoDB + S3 + ECS Fargate + ALB

# ─── PARAMETERS ───────────────────────────────────────────────────────────────
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy into (use your default VPC)

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least 2 public subnets (for ALB + ECS tasks)

  JwtSecret:
    Type: String
    NoEcho: true
    Description: JWT signing secret

  FrontendUrl:
    Type: String
    Default: http://localhost:3000
    Description: Frontend origin for CORS (Amplify URL after deploy)

  EcrImageUri:
    Type: String
    Description: "ECR image URI, e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/eventflow-backend:latest"

  TableName:
    Type: String
    Default: eventflow

  DesiredCount:
    Type: Number
    Default: 1

# ─── RESOURCES ────────────────────────────────────────────────────────────────
Resources:

  # ── DynamoDB ──────────────────────────────────────────────────────────────
  EventFlowTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: pk,     AttributeType: S }
        - { AttributeName: sk,     AttributeType: S }
        - { AttributeName: gsi1pk, AttributeType: S }
        - { AttributeName: gsi1sk, AttributeType: S }
        - { AttributeName: gsi2pk, AttributeType: S }
        - { AttributeName: gsi2sk, AttributeType: S }
      KeySchema:
        - { AttributeName: pk, KeyType: HASH }
        - { AttributeName: sk, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - { AttributeName: gsi1pk, KeyType: HASH }
            - { AttributeName: gsi1sk, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: GSI2
          KeySchema:
            - { AttributeName: gsi2pk, KeyType: HASH }
            - { AttributeName: gsi2sk, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # ── S3 Bucket (layout JSON) ───────────────────────────────────────────────
  LayoutsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !Sub 'eventflow-layouts-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ['*']
            AllowedMethods: [GET, PUT]
            AllowedHeaders: ['*']
            MaxAge: 3000

  # ── ECR Repository ────────────────────────────────────────────────────────
  EcrRepository:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    Properties:
      RepositoryName: eventflow-backend
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last 5 images",
              "selection": { "tagStatus": "any", "countType": "imageCountMoreThan", "countNumber": 5 },
              "action": { "type": "expire" }
            }]
          }

  # ── IAM: ECS Task Execution Role ─────────────────────────────────────────
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: eventflow-ecs-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # ── IAM: ECS Task Role (DynamoDB + S3 access) ────────────────────────────
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: eventflow-ecs-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                Resource:
                  - !GetAtt EventFlowTable.Arn
                  - !Sub '${EventFlowTable.Arn}/index/*'
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub 'arn:aws:s3:::eventflow-layouts-${AWS::AccountId}/*'

  # ── CloudWatch Log Group ──────────────────────────────────────────────────
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/eventflow-backend
      RetentionInDays: 14

  # ── ECS Cluster ───────────────────────────────────────────────────────────
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: eventflow
      CapacityProviders: [FARGATE, FARGATE_SPOT]

  # ── Security Group: ALB ───────────────────────────────────────────────────
  AlbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EventFlow ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 80, ToPort: 80, CidrIp: 0.0.0.0/0 }
        - { IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: 0.0.0.0/0 }

  # ── Security Group: ECS Tasks ─────────────────────────────────────────────
  EcsSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EventFlow ECS Tasks
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 4000
          ToPort: 4000
          SourceSecurityGroupId: !Ref AlbSg

  # ── ALB ───────────────────────────────────────────────────────────────────
  BackendAlb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: eventflow-backend
      Scheme: internet-facing
      Type: application
      Subnets: !Ref PublicSubnetIds
      SecurityGroups: [!Ref AlbSg]

  BackendTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: eventflow-backend
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: 4000
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  BackendListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref BackendAlb
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref BackendTargetGroup

  # ── ECS Task Definition ───────────────────────────────────────────────────
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: eventflow-backend
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: backend
          Image: !Ref EcrImageUri
          PortMappings:
            - ContainerPort: 4000
              Protocol: tcp
          Environment:
            - { Name: AWS_REGION,       Value: !Ref AWS::Region }
            - { Name: DYNAMODB_TABLE,   Value: !Ref TableName }
            - { Name: S3_BUCKET,        Value: !Sub 'eventflow-layouts-${AWS::AccountId}' }
            - { Name: FRONTEND_URL,     Value: !Ref FrontendUrl }
            - { Name: NODE_ENV,         Value: production }
            - { Name: PORT,             Value: '4000' }
            - { Name: JWT_SECRET,       Value: !Ref JwtSecret }
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/eventflow-backend
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  # ── ECS Service ───────────────────────────────────────────────────────────
  EcsService:
    Type: AWS::ECS::Service
    DependsOn: BackendListener
    Properties:
      ServiceName: eventflow-backend
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref PublicSubnetIds
          SecurityGroups: [!Ref EcsSg]
      LoadBalancers:
        - ContainerName: backend
          ContainerPort: 4000
          TargetGroupArn: !Ref BackendTargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200

# ─── OUTPUTS ──────────────────────────────────────────────────────────────────
Outputs:
  BackendUrl:
    Description: Backend API base URL (set as NEXT_PUBLIC_API_URL in frontend)
    Value: !Sub 'http://${BackendAlb.DNSName}/api'

  EcrRepositoryUri:
    Description: ECR repository URI (push your Docker image here)
    Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/eventflow-backend'

  DynamoTableName:
    Value: !Ref EventFlowTable

  S3BucketName:
    Value: !Ref LayoutsBucket
